<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Titan Gym</title>
    <link rel="stylesheet" type="text/css" href="css/style.css">
</head>
<body>

    <div class="banner">
        
        <div class="banner-content">
            <div class="container">
                <h1>TITAN GYM</h1>
                <h2>Push your limits, forge your body.</h2>
                <a href="#apply-section" class="btn-blue">Start Training Now</a>
            </div>
        </div>
        
        <div class="banner-overlay"></div>

    </div>

    <div class="container">
        <h2 class="section-title">Our Titan Clubs</h2>
  
        <div class="cards">
            <div class="card">
                <img src="images/Paris.jpg" alt="Titan Gym Paris">
                <h3>Paris</h3>
            </div>

            <div class="card">
                <img src="images/Lyon.jpg" alt="Titan Gym Lyon">
                <h3>Lyon</h3>
            </div>

            <div class="card">
                <img src="images/Marseille.jpg" alt="Titan Gym Marseille">
                <h3>Marseille</h3>
            </div>
        </div>
    </div>

    <div id="apply-section">

    <div class="container" id="apply">
  <h2 class="section-title">Join the Titan Academy</h2>
  
  <div class="typeform-widget" data-url="https://form.typeform.com/to/i2Y7LwUE" style="width: 100%; height: 500px;"></div>
  <script> (function() { var qs,js,q,s,d=document, gi=d.getElementById, ce=d.createElement, gt=d.getElementsByTagName, id="typef_orm", b="https://embed.typeform.com/"; if(!gi.call(d,id)) { js=ce.call(d,"script"); js.id=id; js.src=b+"embed.js"; q=gt.call(d,"script")[0]; q.parentNode.insertBefore(js,q) } })() </script>
  </div>

</div>
</body>
</html>
